services:
  new-api:
    # Imagem Docker da aplicação NewAPI (baseada no OneAPI)
    # Os arquivos da aplicação estão embutidos nesta imagem
    image: calciumion/new-api:latest
    container_name: new-api
    restart: always
    # No internal port - only accessible via middleware on the same network
    expose:
      - "3000"
    volumes:
      # Monta o diretório local ./data para persistência de dados
      # - Logs da aplicação
      # - Configurações (se aplicável)
      # Monta o diretório local ./data para persistência de dados
      # - Logs da aplicação ficam em ./data/logs/
      # - Dados do banco de dados podem ser persistidos aqui se configurado
      - ./data:/data
    environment:
      - TZ=$TZ
      - LANG=$LANG
      - LANGUAGE=$LANGUAGE
      - LC_ALL=$LC_ALL
      # String de conexão para o banco de dados PostgreSQL
      # Formato: postgres://usuario:senha@host:porta/banco?sslmode=disable
      - SQL_DSN=$SQL_DSN
    depends_on:
      - db-newapi
    deploy:
      resources:
        limits:
          cpus: "0.5"
    networks:
      - newapi-internal
      - atius-shared

  model-detailed:
    # Middleware proxy que enriquece GET /v1/models com metadata DeepSeek
    # Escuta na porta 3300 (pública), faz proxy para new-api:3000 (interna)
    image: python:3.12-slim
    container_name: model-detailed
    restart: always
    ports:
      - "3300:3001"
    volumes:
      - ./integration/middleware:/app:ro
    working_dir: /app
    command: python3 model_detailed.py
    environment:
      - MIDDLEWARE_PORT=3001
      - NEWAPI_BACKEND_URL=http://new-api:3000
    depends_on:
      - new-api
    deploy:
      resources:
        limits:
          cpus: "0.1"
    networks:
      - newapi-internal
      - atius-shared

  db-newapi:
    # Banco de dados PostgreSQL para a aplicação NewAPI
    image: postgres:15-alpine
    container_name: db-newapi
    restart: always
    ports:
      - "8746:5432"
    environment:
      - POSTGRES_USER=$POSTGRES_USER
      - POSTGRES_PASSWORD=$POSTGRES_PASSWORD
      - POSTGRES_DB=$POSTGRES_DB
    volumes:
      # Persiste os dados do banco de dados no diretório local
      # Persiste os dados do banco de dados no diretório local
      # Dados do PostgreSQL ficam em ./data/postgres_data/
      - ./data/postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
    networks:
      - newapi-internal
      - atius-shared

networks:
  newapi-internal:
    name: newapi-internal
    external: true
  atius-shared:
    name: atius-shared
    external: true