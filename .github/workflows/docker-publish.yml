name: Publish Docker Image (GHCR)

# Triggered automatically after sync.yml pushes a version tag
# Also triggerable manually with any tag
on:
  workflow_run:
    workflows: ["Daily Upstream Sync"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.13.2.1)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  docker-publish:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    # Only run if sync workflow succeeded or triggered manually
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment:
      name: fork-sync
      url: https://github.com/${{ github.repository }}
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Determine tag to build
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            # Get the latest tag from the sync workflow run
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ -z "$TAG" ]]; then
            echo "No tag found to build"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "Building Docker image for tag: $TAG"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ env.TAG }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push (amd64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ env.TAG }}-amd64
            ghcr.io/${{ github.repository }}:${{ env.TAG }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Build & push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ env.TAG }}-arm64
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Create & push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:${{ env.TAG }} \
            ghcr.io/${{ github.repository }}:${{ env.TAG }}-amd64 \
            ghcr.io/${{ github.repository }}:${{ env.TAG }}-arm64

          # Update :latest if on main
          if [[ "${{ github.ref_name }}" == "main" ]] || [[ "${{ github.event.inputs.tag }}" == "" ]]; then
            docker buildx imagetools create \
              -t ghcr.io/${{ github.repository }}:latest \
              ghcr.io/${{ github.repository }}:${{ env.TAG }}-amd64 \
              ghcr.io/${{ github.repository }}:${{ env.TAG }}-arm64
          fi

      - name: Image summary
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | GHCR |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ env.TAG }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Repositorio | \`${{ github.repository }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Architectures | amd64, arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Imagem:** \`ghcr.io/${{ github.repository }}:${{ env.TAG }}\`" >> $GITHUB_STEP_SUMMARY
