name: Sync Upstream + Release

on:
  schedule:
    - cron: '0 3 * * *'         # Daily at 03:00 UTC
  workflow_dispatch:                # Manual trigger
    inputs:
      strategy:
        description: 'Merge strategy (theirs=upstream wins, ours=fork wins)'
        required: false
        default: 'theirs'
        type: choice
        options:
          - theirs
          - ours

permissions:
  contents: write
  packages: none
  deployments: none

env:
  STRATEGY: ${{ github.event.inputs.strategy || 'theirs' }}
  UPSTREAM_REPO: QuantumNous/new-api

jobs:
  sync:
    name: Sync + Version Bump
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'giovannimnz/router-ai-atius' }}
    environment:
      name: fork-sync
      url: https://github.com/giovannimnz/router-ai-atius
    outputs:
      changed: ${{ steps.sync.outputs.changed }}
      new_tag: ${{ steps.sync.outputs.new_tag }}
      upstream_version: ${{ steps.sync.outputs.upstream_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config merge.conflictstyle merge
          git config push.default simple

      - name: Validate sync workflow guard
        run: scripts/check-upstream-sync-workflow.sh

      - name: Configure upstream remote
        run: |
          set -euo pipefail
          upstream_url="https://github.com/${UPSTREAM_REPO}.git"
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "$upstream_url"
          else
            git remote add upstream "$upstream_url"
          fi

          # Do not fetch upstream tags into the fork namespace. Upstream and fork
          # release tags can share names while pointing to different objects.
          git fetch --no-tags --prune upstream '+refs/heads/main:refs/remotes/upstream/main'

      - name: Detect upstream version
        id: upstream_version
        run: |
          # Get latest tag from upstream (follows upstream exactly — includes rc, alpha, etc.)
          UPSTREAM_TAG=$(git ls-remote --tags --refs upstream 'refs/tags/v*' 2>/dev/null | \
                         awk '{print $2}' | \
                         sed 's|refs/tags/||' | \
                         grep -v '^$' | \
                         sort -V | \
                         tail -1 | sed 's/^v//')
          if [[ -z "$UPSTREAM_TAG" ]]; then
            echo "::error::Unable to detect latest upstream tag from ${{ env.UPSTREAM_REPO }}"
            exit 1
          fi
          echo "upstream_version=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          echo "Upstream latest tag: $UPSTREAM_TAG"

      - name: Sync with upstream
        id: sync
        env:
          SYNC_STRATEGY: ${{ env.STRATEGY }}
          UPSTREAM_VER: ${{ steps.upstream_version.outputs.upstream_version }}
        run: |
          set -euo pipefail
          BASE_HEAD=$(git rev-parse HEAD)
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          LOCAL_SHA=$(git rev-parse HEAD)
          COMMON=$(git merge-base HEAD upstream/main)

          echo "Local:      $LOCAL_SHA"
          echo "Upstream:   $UPSTREAM_SHA ($UPSTREAM_VER)"
          echo "Common:     $COMMON"
          echo "Strategy:   $SYNC_STRATEGY"
          echo ""

          CHANGED=false
          NEW_TAG=""

          restore_protected_paths() {
            local base_ref="$1"
            local path
            local protected_paths=(
              .dockerignore
              .github/workflows/sync.yml
              .github/workflows/docker-publish.yml
              docker-compose.yml
              integration/middleware/model_detailed.py
              integration/middleware/model_details.py
              integration/middleware/model_enrichment.py
              controller/model.go
              controller/model_list_test.go
              relay/common/relay_utils.go
              relay/common/relay_utils_test.go
              relay/embedding_handler.go
              relay/channel/codex
              service/codex_auth.go
              service/codex_device.go
              service/codex_models.go
              service/modelcatalog
            )

            echo "Restoring protected fork paths from $base_ref..."
            for path in "${protected_paths[@]}"; do
              if git cat-file -e "${base_ref}:${path}" 2>/dev/null; then
                git checkout "$base_ref" -- "$path"
              fi
            done
          }

          clear_stale_index_lock() {
            if [[ -f .git/index.lock ]]; then
              echo "Removing stale Git index lock left after failed merge"
              rm -f .git/index.lock
            fi
          }

          resolve_conflicts_with_side() {
            local side="$1"
            local stage
            local path
            local conflict_paths=()
            if [[ "$side" == "theirs" ]]; then
              stage=3
            else
              stage=2
            fi

            clear_stale_index_lock
            mapfile -d '' -t conflict_paths < <(git diff --name-only --diff-filter=U -z)

            for path in "${conflict_paths[@]}"; do
              clear_stale_index_lock
              if git ls-files -u -- "$path" | awk -v stage="$stage" '$3 == stage { found = 1 } END { exit(found ? 0 : 1) }'; then
                clear_stale_index_lock
                git checkout --"$side" -- "$path"
                clear_stale_index_lock
                git add -- "$path"
              else
                clear_stale_index_lock
                git rm -f --ignore-unmatch -- "$path"
                rm -rf -- "$path"
              fi
            done

            if git diff --name-only --diff-filter=U | grep -q .; then
              echo "::error::Unresolved merge conflicts remain after applying $side strategy"
              git diff --name-only --diff-filter=U
              exit 1
            fi
          }

          # Check if upstream has new commits
          if [[ "$COMMON" != "$UPSTREAM_SHA" ]]; then
            echo "🔄 Upstream has new commits, syncing..."

            # Merge upstream
            git merge -X "$SYNC_STRATEGY" upstream/main -m "Merge upstream/main into fork" || {
              echo "Merge conflict detected, using strategy: $SYNC_STRATEGY"
              clear_stale_index_lock
              if [[ "$SYNC_STRATEGY" == "theirs" ]]; then
                resolve_conflicts_with_side theirs
                git commit -m "Resolve conflicts: prefer upstream"
              else
                resolve_conflicts_with_side ours
                git commit -m "Resolve conflicts: prefer fork (ours)"
              fi
            }

            restore_protected_paths "$BASE_HEAD"

            CHANGED=true

            # Calculate new fork version: upstream_VERSION.1
            CURRENT=$(cat VERSION 2>/dev/null | tr -d '[:space:]' || echo "0.0.0.0")

            if [[ "$CURRENT" == "${UPSTREAM_VER}.1" ]] || [[ "$CURRENT" == "v${UPSTREAM_VER}.1" ]]; then
              # Same upstream base, increment suffix
              SUFFIX=$(echo "$CURRENT" | sed "s/.*\.//" | tr -d 'v')
              NEW_SUFFIX=$((SUFFIX + 1))
              NEW_TAG="${UPSTREAM_VER}.${NEW_SUFFIX}"
              echo "📦 Version increment: $CURRENT → $NEW_TAG"
            else
              # New upstream version or first sync, set to upstream_VERSION.1
              NEW_TAG="${UPSTREAM_VER}.1"
              echo "📦 Version bump: $CURRENT → $NEW_TAG (upstream $UPSTREAM_VER + fork suffix)"
            fi

            echo "$NEW_TAG" > VERSION
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
            echo "upstream_version=$UPSTREAM_VER" >> $GITHUB_OUTPUT

            # Commit all changes
            git add -A
            git diff --cached --quiet || git commit -m "chore: sync with upstream to $NEW_TAG"

            echo "✅ Sync completed successfully"
          else
            echo "✅ Already up to date with upstream ($UPSTREAM_VER)"
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "new_tag=" >> $GITHUB_OUTPUT
            echo "upstream_version=$UPSTREAM_VER" >> $GITHUB_OUTPUT
          fi

      - name: Push commit
        if: steps.sync.outputs.changed == 'true'
        run: |
          git push origin main
          echo "🚀 Commit pushed to main"

      - name: Create & push version tag
        if: steps.sync.outputs.changed == 'true'
        env:
          NEW_TAG: ${{ steps.sync.outputs.new_tag }}
        run: |
          git tag "v$NEW_TAG"
          git push origin "v$NEW_TAG"
          echo "🏷️ Created and pushed tag v$NEW_TAG"
          # This tag push triggers docker-publish.yml via workflow_run

      - name: Sync summary
        if: always()
        run: |
          CHANGED=${{ steps.sync.outputs.changed }}
          TAG=${{ steps.sync.outputs.new_tag }}
          UPSTREAM=${{ steps.sync.outputs.upstream_version }}

          {
            echo "## ✅ Upstream Sync Complete"
            echo ""
            echo "| Item | Status |"
            echo "|------|--------|"
            echo "| Upstream | ${{ env.UPSTREAM_REPO }} |"
            echo "| Upstream version | \`$UPSTREAM\` |"
            echo "| Merge | $CHANGED |"
            if [[ "$CHANGED" == "true" && -n "$TAG" ]]; then
              echo "| Version | \`$TAG\` |"
              echo "| Tag pushed | ✅ \`v$TAG\` |"
              echo "| Docker build | ⏳ Triggered automatically |"
            else
              echo "| Status | ⏭️ Already up to date |"
            fi
            echo ""
            echo "**Repository:** https://github.com/${{ github.repository }}"
          } >> "$GITHUB_STEP_SUMMARY"
