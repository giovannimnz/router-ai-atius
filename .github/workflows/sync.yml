name: Sync Upstream + Release

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      strategy:
        description: Estrategia de merge
        required: false
        default: theirs
        type: choice
        options:
          - theirs
          - ours
      codex_conflict_helper:
        description: Executar analise assistida por Codex em caso de falha
        required: false
        default: true
        type: boolean
      codex_model:
        description: Modelo do Codex para analise de falhas
        required: false
        default: gpt-5.4
        type: string
      codex_reasoning_effort:
        description: Nivel de raciocinio do Codex
        required: false
        default: xhigh
        type: string

permissions:
  contents: write
  actions: write

env:
  FORK_REPO: giovannimnz/router-ai-atius
  UPSTREAM_REPO: QuantumNous/new-api
  OMNI_REPO: giovannimnz/omni-srv-admin
  PYTHONPATH: ${{ github.workspace }}/.ci/omni-srv-admin/modules/fork-sync/cli

jobs:
  sync:
    name: Sync + Version Bump
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'giovannimnz/router-ai-atius' }}
    steps:
      - name: Checkout do fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout do omni-srv-admin
        uses: actions/checkout@v5
        with:
          repository: ${{ env.OMNI_REPO }}
          path: .ci/omni-srv-admin
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias do fork-sync
        run: python3 -m pip install pyyaml deep-translator

      - name: Ajustar config do fork-sync para o CI
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import yaml

          path = Path(".ci/omni-srv-admin/modules/fork-sync/projects/atius-router/sync.yaml")
          cfg = yaml.safe_load(path.read_text(encoding="utf-8"))
          cfg["auto_push"] = False

          protected = list(cfg.get("protected_paths") or [])
          extras = [
              "relay/helper/valid_request.go",
              "service/relayconvert/policy.go",
              "service/openai_chat_responses_mode_test.go",
              "controller/channel-test.go",
              "controller/channel.go",
              "relay/codex_auth_error.go",
              "relay/responses_handler.go",
              "relay/compatible_handler.go",
              "relay/chat_completions_via_responses.go",
              "router/channel-router.go",
              "types/error.go",
              "dto/channel_settings.go",
              "setting/console_setting/",
              "web/default/src/features/channels/",
              "web/default/src/features/pricing/components/model-details-api.tsx",
              "web/default/src/features/system-settings/content/default-api-info.ts",
              "web/default/src/features/system-settings/content/index.tsx",
              ".github/workflows/sync.yml",
              ".github/codex/",
          ]
          for item in extras:
              if item not in protected:
                  protected.append(item)
          cfg["protected_paths"] = protected
          path.write_text(yaml.safe_dump(cfg, sort_keys=False, allow_unicode=True), encoding="utf-8")
          PY

      - name: Configurar Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config merge.conflictstyle merge
          git config push.default simple

      - name: Proteger repositorio e configurar remotes
        run: |
          scripts/fork-sync-guard.sh ensure-actions-repo
          scripts/fork-sync-guard.sh configure-remotes
          git fetch --no-tags --prune upstream

      - name: Detectar versao upstream
        id: upstream
        run: |
          set -euo pipefail
          upstream_tag="$(git ls-remote --tags --refs upstream 'refs/tags/v*' | awk '{print $2}' | sed 's|refs/tags/||' | grep -v '^$' | sort -V | tail -1 | sed 's/^v//')"
          if [[ -z "$upstream_tag" ]]; then
            echo "::error::Nao foi possivel detectar a tag mais recente do upstream"
            exit 1
          fi
          echo "version=$upstream_tag" >> "$GITHUB_OUTPUT"

      - name: Dry-run do fork-sync
        id: sync_dry_run
        env:
          FORK_SYNC_AUTO_PUSH: "false"
        run: |
          set -euo pipefail
          python3 -m fork_sync.cli sync atius-router --repo-path "$GITHUB_WORKSPACE" --dry-run --json > sync-dry-run.json
          cat sync-dry-run.json
          can_apply="$(jq -r '.can_apply // false' sync-dry-run.json)"
          local_sha="$(jq -r '.local_sha // ""' sync-dry-run.json)"
          upstream_sha="$(jq -r '.upstream_sha // ""' sync-dry-run.json)"
          needs_sync=false
          if [[ -n "$local_sha" && -n "$upstream_sha" && "$local_sha" != "$upstream_sha" ]]; then
            needs_sync=true
          fi
          echo "can_apply=$can_apply" >> "$GITHUB_OUTPUT"
          echo "needs_sync=$needs_sync" >> "$GITHUB_OUTPUT"

      - name: Validar dry-run
        if: steps.sync_dry_run.outputs.needs_sync == 'true' && steps.sync_dry_run.outputs.can_apply != 'true'
        run: |
          echo "::error::Dry-run do fork-sync nao esta seguro para aplicar"
          jq . sync-dry-run.json
          exit 1

      - name: Aplicar fork-sync
        if: steps.sync_dry_run.outputs.needs_sync == 'true'
        id: sync_apply
        env:
          FORK_SYNC_AUTO_PUSH: "false"
        run: |
          set -euo pipefail
          before_sha="$(git rev-parse HEAD)"
          python3 -m fork_sync.cli sync atius-router --repo-path "$GITHUB_WORKSPACE" --json > sync-apply.json
          cat sync-apply.json
          after_sha="$(git rev-parse HEAD)"
          echo "before_sha=$before_sha" >> "$GITHUB_OUTPUT"
          echo "after_sha=$after_sha" >> "$GITHUB_OUTPUT"

      - name: Resolver versao do fork
        if: steps.sync_dry_run.outputs.needs_sync == 'true'
        id: version
        env:
          UPSTREAM_VERSION: ${{ steps.upstream.outputs.version }}
        run: |
          set -euo pipefail
          current="$(tr -d '[:space:]' < VERSION)"
          next="$(scripts/next-fork-version.sh "$current" "$UPSTREAM_VERSION")"
          echo "$next" > VERSION
          echo "new_tag=$next" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        if: steps.sync_dry_run.outputs.needs_sync == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Validar preservacao do PT-BR
        if: steps.sync_dry_run.outputs.needs_sync == 'true'
        run: scripts/smoke-pt-br-i18n.sh

      - name: Verificar build frontend
        if: steps.sync_dry_run.outputs.needs_sync == 'true'
        env:
          CI_FRONTEND_RETRIES: 1
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: ./scripts/ci-build-frontends.sh "v$NEW_TAG"

      - name: Setup Go
        if: steps.sync_dry_run.outputs.needs_sync == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Verificar build backend
        if: steps.sync_dry_run.outputs.needs_sync == 'true'
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: ./scripts/ci-build-backend.sh "v$NEW_TAG"

      - name: Release preflight
        if: steps.sync_dry_run.outputs.needs_sync == 'true'
        run: |
          python3 .ci/omni-srv-admin/modules/fork-sync/cli/fork_sync/core/release_preflight.py \
            "$GITHUB_WORKSPACE" \
            --mode tag \
            --tag "v${{ steps.version.outputs.new_tag }}" \
            --github-repo "${FORK_REPO}" \
            --json > release-preflight.json
          cat release-preflight.json
          jq -e '.status == "success"' release-preflight.json > /dev/null

      - name: Commitar version bump
        if: steps.sync_dry_run.outputs.needs_sync == 'true'
        run: |
          set -euo pipefail
          git add VERSION
          git diff --cached --quiet || git commit -m "chore: sincroniza com upstream e prepara versão v${{ steps.version.outputs.new_tag }}"

      - name: Gerar release notes PT-BR
        if: steps.sync_dry_run.outputs.needs_sync == 'true'
        run: |
          python3 -m fork_sync.cli release generate atius-router \
            --upstream-version "${{ steps.upstream.outputs.version }}" \
            --fork-tag "v${{ steps.version.outputs.new_tag }}" \
            --save-local

      - name: Push para main
        if: steps.sync_dry_run.outputs.needs_sync == 'true'
        run: scripts/fork-sync-guard.sh push origin main

      - name: Criar e publicar tag
        if: steps.sync_dry_run.outputs.needs_sync == 'true'
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          git tag "v$NEW_TAG"
          scripts/fork-sync-guard.sh push origin "v$NEW_TAG"
          scripts/fork-sync-guard.sh workflow-run release.yml --ref "v$NEW_TAG"
          scripts/fork-sync-guard.sh workflow-run docker-build.yml --ref "v$NEW_TAG"
          scripts/fork-sync-guard.sh workflow-run electron-build.yml --ref "v$NEW_TAG"

      - name: Analise de falha com Codex
        if: ${{ failure() && github.event.inputs.codex_conflict_helper != 'false' }}
        continue-on-error: true
        id: codex_failure_review
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/fork-sync-conflict-review.md
          model: ${{ github.event.inputs.codex_model || 'gpt-5.4' }}
          effort: ${{ github.event.inputs.codex_reasoning_effort || 'xhigh' }}
          codex-args: --json
          sandbox: workspace-write
          output-file: codex-sync-analysis.md
          safety-strategy: drop-sudo

      - name: Upload artefatos de diagnostico
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-diagnostics
          path: |
            sync-dry-run.json
            sync-apply.json
            release-preflight.json
            codex-sync-analysis.md
          if-no-files-found: ignore

      - name: Resumo
        if: always()
        run: |
          {
            echo "## Resultado do Sync"
            echo ""
            echo "- Upstream: \`${UPSTREAM_REPO}\`"
            echo "- Versão upstream detectada: \`${{ steps.upstream.outputs.version }}\`"
            echo "- Precisa sync: \`${{ steps.sync_dry_run.outputs.needs_sync || 'false' }}\`"
            echo "- Dry-run seguro: \`${{ steps.sync_dry_run.outputs.can_apply || 'false' }}\`"
            if [[ "${{ steps.sync_dry_run.outputs.needs_sync }}" == "true" ]]; then
              echo "- Nova tag do fork: \`v${{ steps.version.outputs.new_tag }}\`"
              echo "- Release/builds: serão disparados automaticamente pelo push da tag"
            else
              echo "- Status: sem novos commits upstream para aplicar"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
