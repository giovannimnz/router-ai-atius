services:
  new-api:
    image: ghcr.io/giovannimnz/router-ai-atius:local
    container_name: new-api
    restart: always
    ports:
      - "3301:3000"
    environment:
      - SQL_DSN=postgres://admin:Bkfigt!546@db-newapi:5432/newapi?sslmode=disable
      - TZ=America/Sao_Paulo
      - LANG=pt_BR.UTF-8
      - SESSION_SECRET=${SESSION_SECRET}
      - TRUST_PROXY=true
    env_file:
      - .env
    volumes:
      - ./data:/data
    networks:
      - newapi-internal
      - atius-shared
    healthcheck:
      test: ["CMD", "wget", "-O-", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  model-detailed:
    build:
      context: ./integration/middleware
      dockerfile: Dockerfile.fastapi
    container_name: model-detailed
    restart: always
    ports:
      - "3300:3001"
    environment:
      - MIDDLEWARE_PORT=3001
      - NEWAPI_BACKEND_URL=http://new-api:3000
      - NEW_API_INTERNAL_URL=http://new-api:3000
      - BACKEND_TIMEOUT=60
    networks:
      - newapi-internal
      - atius-shared
    depends_on:
      new-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-O-", "-q", "http://localhost:3001/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  db-newapi:
    image: postgres:15-alpine
    container_name: db-newapi
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=Bkfigt!546
      - POSTGRES_DB=newapi
    volumes:
      - ./db-data:/var/lib/postgresql/data
    networks:
      - newapi-internal

networks:
  newapi-internal:
    internal: true
  atius-shared:
    external: true
