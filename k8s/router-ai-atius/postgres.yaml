apiVersion: v1
kind: Service
metadata:
  name: router-ai-atius-postgres
  namespace: router-ai-atius
  labels:
    app.kubernetes.io/name: router-ai-atius-postgres
    app.kubernetes.io/part-of: atius-router
spec:
  selector:
    app.kubernetes.io/name: router-ai-atius-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: router-ai-atius-postgres-data
  namespace: router-ai-atius
  labels:
    app.kubernetes.io/name: router-ai-atius-postgres
    app.kubernetes.io/part-of: atius-router
  annotations:
    router.atius.com.br/storage-warning: "local-path is single-node, RWO, reclaim Delete, and not HA"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: router-ai-atius-postgres
  namespace: router-ai-atius
  labels:
    app.kubernetes.io/name: router-ai-atius-postgres
    app.kubernetes.io/part-of: atius-router
spec:
  serviceName: router-ai-atius-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: router-ai-atius-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: router-ai-atius-postgres
        app.kubernetes.io/part-of: atius-router
    spec:
      containers:
        - name: postgres
          image: docker.io/library/postgres:15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: router-ai-atius-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: router-ai-atius-config
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: router-ai-atius-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 500m
              memory: 2Gi
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: router-ai-atius-postgres-data
