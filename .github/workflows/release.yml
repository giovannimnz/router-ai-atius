name: Release (Linux, macOS, Windows)
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'reason'
        required: false
  push:
    tags:
      - '*'
      - '!*-alpha*'

jobs:
  release_notes:
    name: Release Notes PT-BR
    runs-on: ubuntu-latest
    outputs:
      artifact_name: release-notes
    steps:
      - name: Checkout do fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout do omni-srv-admin
        uses: actions/checkout@v5
        with:
          repository: giovannimnz/omni-srv-admin
          path: .ci/omni-srv-admin
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias do fork-sync
        run: python3 -m pip install pyyaml deep-translator

      - name: Salvar versoes temporarias
        run: |
          VERSION="$(git describe --tags)"
          FORK_VERSION="${VERSION#v}"
          UPSTREAM_VERSION="${FORK_VERSION%.*}"
          printf '%s\n' "$VERSION" > .release-version
          printf '%s\n' "$UPSTREAM_VERSION" > .release-upstream-version
        shell: bash

      - name: Gerar release notes PT-BR
        env:
          PYTHONPATH: ${{ github.workspace }}/.ci/omni-srv-admin/modules/fork-sync/cli
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from fork_sync.core.release_notes import generate_release_notes

          version = Path(".release-version").read_text(encoding="utf-8").strip()
          upstream_version = Path(".release-upstream-version").read_text(encoding="utf-8").strip()
          result = generate_release_notes(
              project_name="atius-router",
              upstream_version=upstream_version,
              fork_tag=version,
              upstream_url="https://github.com/QuantumNous/new-api",
              fork_url="https://github.com/giovannimnz/router-ai-atius",
              translate=True,
          )
          Path("release-notes.md").write_text(result["body"], encoding="utf-8")
          PY
        shell: bash

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  linux:
    name: Linux Release
    runs-on: ubuntu-latest
    needs: release_notes
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
      - name: Determine Version
        run: |
          VERSION=$(git describe --tags)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Build Frontends
        env:
          CI: ""
        run: |
          ./scripts/ci-build-frontends.sh "$VERSION"
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '>=1.25.1'
      - name: Build Backend (amd64)
        run: |
          go mod download
          go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION' -extldflags '-static'" -o new-api-$VERSION
      - name: Build Backend (arm64)
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y gcc-aarch64-linux-gnu
          CC=aarch64-linux-gnu-gcc CGO_ENABLED=1 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION' -extldflags '-static'" -o new-api-arm64-$VERSION
      - name: Generate checksums
        run: sha256sum new-api-* > checksums-linux.txt

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: release-notes.md
          files: |
            new-api-*
            checksums-linux.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos:
    name: macOS Release
    runs-on: macos-latest
    needs: release_notes
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Determine Version
        run: |
          VERSION=$(git describe --tags)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Build Frontends
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          ./scripts/ci-build-frontends.sh "$VERSION"
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '>=1.25.1'
      - name: Build Backend
        run: |
          go mod download
          go build -ldflags "-X 'github.com/QuantumNous/new-api/common.Version=$VERSION'" -o new-api-macos-$VERSION
      - name: Generate checksums
        run: shasum -a 256 new-api-macos-* > checksums-macos.txt

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            new-api-macos-*
            checksums-macos.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    name: Windows Release
    runs-on: windows-latest
    needs: release_notes
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Determine Version
        run: |
          VERSION=$(git describe --tags)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Build Frontends
        env:
          CI: ""
        run: |
          ./scripts/ci-build-frontends.sh "$VERSION"
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '>=1.25.1'
      - name: Build Backend
        run: |
          go mod download
          go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION'" -o new-api-$VERSION.exe
      - name: Generate checksums
        run: sha256sum new-api-*.exe > checksums-windows.txt

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            new-api-*.exe
            checksums-windows.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
