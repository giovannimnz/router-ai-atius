apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: router-ai-atius-data
  namespace: router-ai-atius
  labels:
    app.kubernetes.io/name: router-ai-atius
    app.kubernetes.io/part-of: atius-router
  annotations:
    router.atius.com.br/storage-warning: "local-path is single-node, RWO, reclaim Delete, and not HA"
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-ai-atius
  namespace: router-ai-atius
  labels:
    app.kubernetes.io/name: router-ai-atius
    app.kubernetes.io/part-of: atius-router
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: router-ai-atius
  template:
    metadata:
      labels:
        app.kubernetes.io/name: router-ai-atius
        app.kubernetes.io/part-of: atius-router
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: atius.com.br/router-ai-atius-node
                    operator: In
                    values: ["true"]
      containers:
        - name: router-ai-atius
          image: ghcr.io/giovannimnz/router-ai-atius@sha256:39365ea9136e14cc9b4a5358621725412bc13f023a2d61e20b851adcd03716fa
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: router-ai-atius-config
          env:
            - name: SQL_DSN
              value: postgresql://admin:$(POSTGRES_PASSWORD)@router-ai-atius-postgres:5432/DBRouterAiAtius?sslmode=disable
            - name: REDIS_CONN_STRING
              value: redis://:$(REDIS_PASSWORD)@router-ai-atius-redis:6379
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: router-ai-atius-secrets
                  key: POSTGRES_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: router-ai-atius-secrets
                  key: REDIS_PASSWORD
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: router-ai-atius-secrets
                  key: SESSION_SECRET
          volumeMounts:
            - name: router-data
              mountPath: /data
            - name: router-logs
              mountPath: /app/logs
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 500m
              memory: 4Gi
      volumes:
        - name: router-data
          persistentVolumeClaim:
            claimName: router-ai-atius-data
        - name: router-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: router-ai-atius
  namespace: router-ai-atius
  labels:
    app.kubernetes.io/name: router-ai-atius
    app.kubernetes.io/part-of: atius-router
  annotations:
    router.atius.com.br/public-edge: "apache-shadow-only"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: router-ai-atius
  ports:
    - name: http
      port: 3000
      targetPort: http
