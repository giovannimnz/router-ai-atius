apiVersion: v1
kind: Service
metadata:
  name: router-ai-atius-redis
  namespace: router-ai-atius
  labels:
    app.kubernetes.io/name: router-ai-atius-redis
    app.kubernetes.io/part-of: atius-router
spec:
  selector:
    app.kubernetes.io/name: router-ai-atius-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-ai-atius-redis
  namespace: router-ai-atius
  labels:
    app.kubernetes.io/name: router-ai-atius-redis
    app.kubernetes.io/part-of: atius-router
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: router-ai-atius-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: router-ai-atius-redis
        app.kubernetes.io/part-of: atius-router
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: atius.com.br/router-ai-atius-node
                    operator: In
                    values: ["true"]
      containers:
        - name: redis
          image: docker.io/library/redis@sha256:084f4bcb3fedf990ba43d26774f58ed4697a2c044156544ac4717934ad1d57c8
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ceu
          args:
            - |
              umask 077
              case "$REDISCLI_AUTH" in
                ''|*[!A-Za-z0-9._~+/=-]*) exit 1 ;;
              esac
              install -d -m 0700 /run/redis
              printf 'appendonly no\nrequirepass "%s"\n' "$REDISCLI_AUTH" > /run/redis/redis.conf
              chmod 0600 /run/redis/redis.conf
              unset REDISCLI_AUTH
              exec redis-server /run/redis/redis.conf
          env:
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: router-ai-atius-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli ping | grep -qx PONG
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli ping | grep -qx PONG
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: redis-tmp
              mountPath: /data
            - name: redis-config
              mountPath: /run/redis
      volumes:
        - name: redis-tmp
          emptyDir: {}
        - name: redis-config
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
