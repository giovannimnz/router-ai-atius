# POD: router-ai-stack (postgres + redis + router + model-detailed)
# Infra container shares host network namespace (podman pod infra).

pods:
  router-ai-stack:
    hostnetwork: true
    infra_port_bindings:
      - "3000:3000"
      - "3001:3001"
      - "3300:3001"

services:
  postgres:
    image: docker.io/library/postgres:15-alpine
    pod: router-ai-stack
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  redis:
    image: docker.io/library/redis:7-alpine
    pod: router-ai-stack
    container_name: redis
    restart: unless-stopped

  router-ai-atius:
    image: ghcr.io/giovannimnz/router-ai-atius:latest
    pod: router-ai-stack
    container_name: router-ai-atius
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    volumes:
      - /home/ubuntu/GitHub/containers/router-ai-atius/data:/data
      - /home/ubuntu/GitHub/containers/router-ai-atius/logs:/app/logs

  model-detailed:
    image: localhost/router-ai-atius-model-detailed:latest
    pod: router-ai-stack
    container_name: model-detailed
    restart: unless-stopped
    depends_on:
      - router-ai-atius
    environment:
      NEWAPI_BACKEND_URL: http://localhost:3000
      NEW_API_INTERNAL_URL: http://localhost:3000
      ROUTER_URL: http://localhost:3000
      BACKEND_TIMEOUT: "60"
      MIDDLEWARE_PORT: "3001"
      OPENAPI_SPEC_PATH: /app/docs/openapi.json
      STATIC_FILES_PATH: /app/static
      ATIUS_RATE_QUEUE_ENABLED: "1"
      ATIUS_RATE_QUEUE_STATE_DIR: /tmp/atius-router-rate-queue
      ATIUS_RATE_QUEUE_MAX_WAIT: "45"
      ATIUS_RATE_QUEUE_MAX_RETRIES: "2"
      ATIUS_RATE_QUEUE_MINIMAX_CHAT_INTERVAL: "1.5"
      ATIUS_RATE_QUEUE_MINIMAX_EMBEDDINGS_INTERVAL: "5.0"
      ATIUS_RATE_QUEUE_DEEPSEEK_CHAT_INTERVAL: "0.5"
      ATIUS_RATE_QUEUE_CODEX_CHAT_INTERVAL: "0.5"
      ATIUS_RATE_QUEUE_OPENAI_EMBEDDINGS_INTERVAL: "1.0"
    volumes:
      - /home/ubuntu/GitHub/containers/router-ai-atius/runtime/model-detailed/model_detailed_fastapi.py:/app/model_detailed_fastapi.py:ro
