services:
  new-api:
    image: ghcr.io/giovannimnz/router-ai-atius:latest
    container_name: new-api
    restart: always
    ports:
      - "3301:3000"
    environment:
      - SQL_DSN=postgres://admin:***@host.containers.internal:5432/newapi?sslmode=disable
      - TZ=America/Sao_Paulo
      - LANG=pt_BR.UTF-8
      - SESSION_SECRET=${SESSION_SECRET}
      - TRUST_PROXY=true
    env_file:
      - .env
    volumes:
      - ./data:/data
    networks:
      - default
      - atius-shared
    healthcheck:
      test: ["CMD", "wget", "-O-", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db-newapi:
    image: docker.io/library/postgres:15-alpine
    container_name: db-newapi
    restart: always
    network_mode: host
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=Bkfigt!546
      - POSTGRES_DB=newapi
    volumes:
      - db-newapi-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d newapi"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-newapi-data:

networks:
  default:
    name: podman
  atius-shared:
    external: true
