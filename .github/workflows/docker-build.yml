name: Publish Docker image (Multi-arch)

on:
  push:
    tags:
      - '*'
      - '!nightly*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to build (e.g., v0.10.8-alpha.3)'
        required: true
        type: string

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    permissions:
      packages: write
      contents: read
      id-token: write

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && 0 || 1 }}
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag & write VERSION
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "::error::Tag '$TAG' does not exist"
              exit 1
            fi
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "${TAG}" > VERSION
          echo "Building tag: ${TAG} for ${{ matrix.arch }}"

      - name: Resolve image targets
        id: image_targets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          ghcr_image="ghcr.io/${owner}/new-api"
          dockerhub_image="calciumion/new-api"

          echo "ghcr_image=${ghcr_image}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=${dockerhub_image}" >> "$GITHUB_OUTPUT"

          {
            echo "tags<<EOF"
            echo "${ghcr_image}:${TAG}-${{ matrix.arch }}"
            echo "${ghcr_image}:latest-${{ matrix.arch }}"
            if [[ -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" ]]; then
              echo "${dockerhub_image}:${TAG}-${{ matrix.arch }}"
              echo "${dockerhub_image}:latest-${{ matrix.arch }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [[ -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" ]]; then
            echo "dockerhub_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DockerHub secrets are not configured; publishing GHCR only."
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Log in to Docker Hub
        if: steps.image_targets.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.image_targets.outputs.ghcr_image }}
            ${{ steps.image_targets.outputs.dockerhub_image }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.image_targets.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        run: |
          cosign sign --yes "${{ steps.image_targets.outputs.ghcr_image }}@${{ steps.build.outputs.digest }}"
          if [[ "${{ steps.image_targets.outputs.dockerhub_enabled }}" == "true" ]]; then
            cosign sign --yes "${{ steps.image_targets.outputs.dockerhub_image }}@${{ steps.build.outputs.digest }}"
          fi

      - name: Image summary
        run: |
          echo "### Docker Image Digest (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.image_targets.outputs.ghcr_image }}:${TAG}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.image_targets.outputs.dockerhub_enabled }}" == "true" ]]; then
            echo "${{ steps.image_targets.outputs.dockerhub_image }}:${TAG}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  create_manifests:
    name: Create multi-arch manifests
    needs: [build_single_arch]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      packages: write
      contents: read

    steps:
      - name: Set version
        run: echo "TAG=${{ needs.build_single_arch.outputs.tag }}" >> $GITHUB_ENV

      - name: Resolve image targets
        id: image_targets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "ghcr_image=ghcr.io/${owner}/new-api" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=calciumion/new-api" >> "$GITHUB_OUTPUT"
          if [[ -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" ]]; then
            echo "dockerhub_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DockerHub secrets are not configured; publishing GHCR manifest only."
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Log in to Docker Hub
        if: steps.image_targets.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push GHCR manifest (version)
        run: |
          docker buildx imagetools create \
            -t "${{ steps.image_targets.outputs.ghcr_image }}:${TAG}" \
            "${{ steps.image_targets.outputs.ghcr_image }}:${TAG}-amd64" \
            "${{ steps.image_targets.outputs.ghcr_image }}:${TAG}-arm64"

      - name: Create & push GHCR manifest (latest)
        run: |
          docker buildx imagetools create \
            -t "${{ steps.image_targets.outputs.ghcr_image }}:latest" \
            "${{ steps.image_targets.outputs.ghcr_image }}:latest-amd64" \
            "${{ steps.image_targets.outputs.ghcr_image }}:latest-arm64"

      - name: Create & push Docker Hub manifest (version)
        if: steps.image_targets.outputs.dockerhub_enabled == 'true'
        run: |
          docker buildx imagetools create \
            -t "${{ steps.image_targets.outputs.dockerhub_image }}:${TAG}" \
            "${{ steps.image_targets.outputs.dockerhub_image }}:${TAG}-amd64" \
            "${{ steps.image_targets.outputs.dockerhub_image }}:${TAG}-arm64"

      - name: Create & push Docker Hub manifest (latest)
        if: steps.image_targets.outputs.dockerhub_enabled == 'true'
        run: |
          docker buildx imagetools create \
            -t "${{ steps.image_targets.outputs.dockerhub_image }}:latest" \
            "${{ steps.image_targets.outputs.dockerhub_image }}:latest-amd64" \
            "${{ steps.image_targets.outputs.dockerhub_image }}:latest-arm64"

      - name: Manifest summary
        run: |
          echo "### Multi-arch Manifest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect "${{ steps.image_targets.outputs.ghcr_image }}:${TAG}" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.image_targets.outputs.dockerhub_enabled }}" == "true" ]]; then
            docker buildx imagetools inspect "${{ steps.image_targets.outputs.dockerhub_image }}:${TAG}" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
