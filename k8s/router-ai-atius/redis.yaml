apiVersion: v1
kind: Service
metadata:
  name: router-ai-atius-redis
  namespace: router-ai-atius
  labels:
    app.kubernetes.io/name: router-ai-atius-redis
    app.kubernetes.io/part-of: atius-router
spec:
  selector:
    app.kubernetes.io/name: router-ai-atius-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-ai-atius-redis
  namespace: router-ai-atius
  labels:
    app.kubernetes.io/name: router-ai-atius-redis
    app.kubernetes.io/part-of: atius-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: router-ai-atius-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: router-ai-atius-redis
        app.kubernetes.io/part-of: atius-router
    spec:
      containers:
        - name: redis
          image: docker.io/library/redis:7-alpine
          imagePullPolicy: IfNotPresent
          args:
            - sh
            - -c
            - exec redis-server --appendonly no --requirepass "$REDIS_PASSWORD"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: router-ai-atius-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: redis-tmp
              mountPath: /data
      volumes:
        - name: redis-tmp
          emptyDir: {}
