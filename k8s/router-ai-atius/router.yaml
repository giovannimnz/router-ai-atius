apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: router-ai-atius-data
  namespace: router-ai-atius
  labels:
    app.kubernetes.io/name: router-ai-atius
    app.kubernetes.io/part-of: atius-router
  annotations:
    router.atius.com.br/storage-warning: "local-path is single-node, RWO, reclaim Delete, and not HA"
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-ai-atius
  namespace: router-ai-atius
  labels:
    app.kubernetes.io/name: router-ai-atius
    app.kubernetes.io/part-of: atius-router
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: router-ai-atius
  template:
    metadata:
      labels:
        app.kubernetes.io/name: router-ai-atius
        app.kubernetes.io/part-of: atius-router
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: atius.com.br/router-ai-atius-node
                    operator: In
                    values: ["true"]
      containers:
        - name: router-ai-atius
          image: ghcr.io/giovannimnz/router-ai-atius@sha256:db7978a0db9fe745c133f91722e6d446c3506300ef36958dedb2ede5907d1b3a
          imagePullPolicy: Never
          command:
            - /bin/sh
            - -ec
          args:
            - |
              url_encode() {
                encoded=
                for hex in $(printf '%s' "$1" | od -An -tx1); do
                  case "$hex" in
                    2d|2e|3[0-9]|4[1-9a-f]|5[0-9a]|5f|6[1-9a-f]|7[0-9a]|7e)
                      octal="$(printf '%03o' "$(printf '%d' "0x${hex}")")"
                      encoded="${encoded}$(printf '%b' "\\${octal}")"
                      ;;
                    *)
                      encoded="${encoded}%$(printf '%s' "$hex" | tr '[:lower:]' '[:upper:]')"
                      ;;
                  esac
                done
                printf '%s' "$encoded"
              }
              export SQL_DSN="postgresql://admin:$(url_encode "$POSTGRES_PASSWORD")@router-ai-atius-postgres:5432/DBRouterAiAtius?sslmode=disable"
              export REDIS_CONN_STRING="redis://:$(url_encode "$REDIS_PASSWORD")@router-ai-atius-redis:6379"
              exec /new-api
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: router-ai-atius-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: router-ai-atius-secrets
                  key: POSTGRES_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: router-ai-atius-secrets
                  key: REDIS_PASSWORD
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: router-ai-atius-secrets
                  key: SESSION_SECRET
          volumeMounts:
            - name: router-data
              mountPath: /data
            - name: router-logs
              mountPath: /app/logs
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 500m
              memory: 4Gi
      volumes:
        - name: router-data
          persistentVolumeClaim:
            claimName: router-ai-atius-data
        - name: router-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: router-ai-atius
  namespace: router-ai-atius
  labels:
    app.kubernetes.io/name: router-ai-atius
    app.kubernetes.io/part-of: atius-router
  annotations:
    router.atius.com.br/public-edge: "apache-shadow-only"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: router-ai-atius
  ports:
    - name: http
      port: 3000
      targetPort: http
