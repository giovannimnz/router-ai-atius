# router-ai-atius — Frontend Development (rebrand v2.11.1)
#
# Backend built from local source for frontend dev iteration.
#
# Usage:
#   1. docker compose -f docker-compose.dev.yml up -d
#   2. cd web/default && bun install && bun run dev
#   3. Open http://localhost:3301 (Rsbuild dev server, API auto-proxied to :3030)
#
# Rebuild backend after Go code changes:
#   docker compose -f docker-compose.dev.yml up -d --build router-ai-atius
#
# Stop:
#   docker compose -f docker-compose.dev.yml down
#
# Reset data:
#   docker compose -f docker-compose.dev.yml down -v
#
# Rebrand v2.11: services renamed to router-ai-atius-*, network
# router-ai-atius-dev, db DBRouterAiAtius. Prod uses port 3030;
# dev uses 3301 to avoid clashing with prod on the same host.

services:
  router-ai-atius-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: router-ai-atius-dev:latest
    container_name: router-ai-atius-dev
    restart: unless-stopped
    ports:
      - "3301:3000"  # dev host 3301 → container 3000 (prod uses 3030)
    volumes:
      - dev_data:/data
    environment:
      - SQL_DSN=postgresql://root:123456@router-ai-atius-dev-pg:5432/DBRouterAiAtius
      - REDIS_CONN_STRING=redis://router-ai-atius-dev-redis:6379
      - TZ=America/Sao_Paulo
      - LANG=pt_BR.UTF-8
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=router-ai-atius-dev
      - TRUST_PROXY=true
    depends_on:
      router-ai-atius-dev-redis:
        condition: service_started
      router-ai-atius-dev-pg:
        condition: service_healthy
    networks:
      - router-ai-atius-dev

  router-ai-atius-dev-redis:
    image: redis:7-alpine
    container_name: router-ai-atius-dev-redis
    restart: unless-stopped
    networks:
      - router-ai-atius-dev

  router-ai-atius-dev-pg:
    image: postgres:15-alpine
    container_name: router-ai-atius-dev-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: DBRouterAiAtius
    volumes:
      - dev_pg_data:/var/lib/postgresql/data
    networks:
      - router-ai-atius-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d DBRouterAiAtius"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  dev_data:
  dev_pg_data:

networks:
  router-ai-atius-dev:
    driver: bridge
